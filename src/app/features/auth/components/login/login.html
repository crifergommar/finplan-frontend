<div class="login-background">
  <div class="login-card">
    <h1 class="login-title">Bienvenido de nuevo</h1>
    <p class="login-subtitle">Inicia sesión en tu panel seguro</p>

    @if (mensajeError) {
      <div class="error-msg">
        {{ mensajeError}}
      </div>
    }

    <form [formGroup]="loginForm" (ngSubmit)="onLogin()">
      <div class="input-group">
        <label for="email">Correo electrónico</label>
        <div class="input-wrapper">
          <i class="fas fa-envelope input-icon"></i>
          <input type="email" id="email" formControlName="email" placeholder="name&#64;company.com">
        </div>
      </div>

      <div class="input-group">
        <div class="label-row">
          <label for="password">Contraseña</label>
          <a class="forgot-link" href="#">¿Olvidaste tu contraseña?</a>
        </div>
        <div class="input-wrapper">
          <i class="fas fa-lock input-icon"></i>
          <input [type]="mostrarPassword ? 'text' : 'password'" id="password" formControlName="password" placeholder="••••••••">
          <button type="button" class="toggle-password" (click)="mostrarPassword = !mostrarPassword">
            <i [class]="mostrarPassword ? 'fas fa-eye' : 'fas fa-eye-slash'"></i>
          </button>
        </div>
      </div>

      <button type="submit" class="btn-login" [disabled]="cargando">
        {{ cargando ? 'Ingresando...' : 'Iniciar sesión' }}
        @if (!cargando) {
          <span>&rarr;</span>
        }
      </button>
    </form>

    <p class="register-link">
      ¿No tienes una cuenta? <a routerLink="/register">Regístrate</a>
    </p>
  </div>
</div>
