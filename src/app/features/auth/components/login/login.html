<div class="login-page">
    <div class="login-card">
        <div class="card-image">
            <div class="mosaic">
                <img src="images/logo.png" alt="FinPlan" class="mosaic-img">
                <img src="images/logo.png" alt="FinPlan" class="mosaic-img">
                <img src="images/logo.png" alt="FinPlan" class="mosaic-img">
                <img src="images/logo.png" alt="FinPlan" class="mosaic-img">
            </div>
            <div class="card-image-overlay">
                <h2>Bienvenido a FinPlan</h2>
                <p>Tu gestor financiero personal</p>
            </div>
        </div>
        <div class="card-form">
            <div class="form-header">
                <img src="images/logo.png" alt="FinPlan logo" class="brand-logo">
                <h2>Iniciar sesión</h2>
                <p>Ingresa tus credenciales para continuar</p>
            </div>

            <div *ngIf="errorMsg" class="error-msg">{{ errorMsg }}</div>

            <form [formGroup]="form" (ngSubmit)="onSubmit()">
                <div class="input-group">
                    <label for="email">Correo electrónico</label>
                    <div class="input-icon-wrapper">
                        <i class="fas fa-envelope input-icon"></i>
                        <input
                            type="email"
                            id="email"
                            formControlName="email"
                            placeholder="correo@ejemplo.com"
                            autocomplete="email"
                        >
                    </div>
                    <span class="field-error" *ngIf="form.get('email')?.invalid && form.get('email')?.touched">
                        Ingresa un correo válido.
                    </span>
                </div>

                <div class="input-group">
                    <label for="password">Contraseña</label>
                    <div class="input-icon-wrapper">
                        <i class="fas fa-lock input-icon"></i>
                        <input
                            [type]="mostrarPassword ? 'text' : 'password'"
                            id="password"
                            formControlName="password"
                            placeholder="Tu contraseña"
                            autocomplete="current-password"
                        >
                        <button type="button" class="toggle-password" (click)="togglePassword()">
                            <i [class]="mostrarPassword ? 'fas fa-eye-slash' : 'fas fa-eye'"></i>
                        </button>
                    </div>
                    <span class="field-error" *ngIf="form.get('password')?.invalid && form.get('password')?.touched">
                        La contraseña es requerida.
                    </span>
                </div>

                <div class="forgot-password">
                    <span class="forgot-link">¿Olvidaste tu contraseña?</span>
                </div>

                <button type="submit" class="btn-submit" [disabled]="cargando">
                    {{ cargando ? 'Iniciando sesión...' : 'Iniciar sesión' }}
                </button>
            </form>

            <p class="register-link">¿No tienes cuenta? <a routerLink="/register">Regístrate aquí</a></p>

            <footer class="card-footer">
                <span>© 2026 FinPlan · <a href="#">Privacidad</a> · <a href="#">Términos</a></span>
            </footer>
        </div>
    </div>
</div>
