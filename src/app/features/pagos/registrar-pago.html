<div class="payment-page">

  <div class="payment-card">

    <h2>Registrar Pago</h2>
    <p class="subtitle">
      Ingrese los detalles para conciliar un pago pendiente.
    </p>

    <!-- SELECT DEUDA -->
    <div class="form-group">
      <label>Seleccionar Deuda</label>
      <select>
        <option>Elija una deuda de la lista</option>
      </select>
      <small>Solo se muestran deudas con saldo pendiente.</small>
    </div>

    <!-- FILA DOBLE -->
    <div class="form-row">

      <div class="form-group">
        <label>Monto</label>
        <input type="text" placeholder="$ 0.00">
      </div>

      <div class="form-group">
        <label>Fecha de Pago</label>
        <input type="date">
      </div>

    </div>

    <!-- MÉTODO DE PAGO -->
    <div class="form-group">
      <label>Método de Pago</label>

      <div class="methods">

        <button class="method active">
          <i class="fas fa-money-bill-wave"></i>
          Efectivo
        </button>

        <button class="method">
          <i class="fas fa-university"></i>
          Transferencia
        </button>

        <button class="method">
          <i class="fas fa-credit-card"></i>
          Tarjeta
        </button>

      </div>
    </div>

    <!-- NOTAS -->
    <div class="form-group">
      <label>Notas (Opcional)</label>
      <textarea placeholder="Añade detalles adicionales o número de confirmación..."></textarea>
    </div>

    <!-- BOTONES -->
    <div class="actions">
      <button class="btn-save">Guardar Pago</button>
      <button class="btn-cancel">Cancelar</button>
    </div>

  </div>

</div>
